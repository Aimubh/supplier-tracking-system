<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lazer Believe mark">
  <defs>
    <!-- One rounded "pillow" tile: a square whose sides bow inward slightly. -->
    <path id="lb-tile" d="M4 4
      Q50 16 96 4 Q84 50 96 96 Q50 84 4 96 Q16 50 4 4 Z"/>
  </defs>
  <g fill="currentColor">
    <!-- 2x2 grid of pillow tiles with a small gap between them -->
    <use href="#lb-tile" x="0"   y="0"/>
    <use href="#lb-tile" x="100" y="0"/>
    <use href="#lb-tile" x="0"   y="100"/>
    <use href="#lb-tile" x="100" y="100"/>
  </g>
  <!-- Four-petal flower carved out of the centre (white negative space) -->
  <g fill="#ffffff">
    <path d="M100 70 Q112 88 130 100 Q112 112 100 130 Q88 112 70 100 Q88 88 100 70 Z"/>
    <circle cx="100" cy="100" r="9"/>
  </g>
  <!-- Arrow accent, top-right -->
  <path fill="currentColor" d="M150 12 L182 6 L176 38 L168 24 Z"/>
</svg>
